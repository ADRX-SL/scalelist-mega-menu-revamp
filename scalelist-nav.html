<!--
  Scalelist Mega Menu — standalone HTML/CSS/JS
  Paste into a WordPress Elementor HTML widget (or any HTML page).
  No external dependencies. Icons are inline SVGs.

  ============================================================
  ★ EDIT YOUR LINKS IN ONE PLACE ★
  Scroll down to the <script id="slMenuConfig"> block and edit
  the URLs there. Each link is defined ONCE and is used for
  both the desktop mega menu AND the mobile drawer.
  ============================================================
-->
<style>
  .sl-nav, .sl-nav * { box-sizing: border-box; }
  .sl-nav {
    --sl-bg: #ffffff;
    --sl-fg: #0a0a0a;
    --sl-muted: #6b7280;
    --sl-border: #e5e7eb;
    --sl-hover: #f5f5f5;
    --sl-shadow: 0 24px 40px -24px rgba(10,10,10,0.18);
    position: sticky; top: 0; z-index: 2147483646; width: 100%;
    background: rgba(255,255,255,0.92);
    backdrop-filter: saturate(180%) blur(8px);
    -webkit-backdrop-filter: saturate(180%) blur(8px);
    border-bottom: 1px solid var(--sl-border);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: var(--sl-fg);
  }
  .sl-nav a { color: inherit; text-decoration: none; }
  .sl-nav button { font: inherit; background: none; border: 0; color: inherit; cursor: pointer; }

  .sl-bar {
    max-width: 1280px; margin: 0 auto;
    height: 64px; padding: 0 24px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .sl-logo { display: inline-flex; align-items: center; gap: 8px; }
  .sl-logo-mark {
    width: 28px; height: 28px; border-radius: 6px;
    background: var(--sl-fg); color: var(--sl-bg);
    display: inline-flex; align-items: center; justify-content: center;
  }
  .sl-logo-text { font-size: 20px; font-weight: 600; letter-spacing: -0.01em; }

  .sl-menu { display: none; align-items: center; gap: 4px; list-style: none; padding: 0; margin: 0; }
  .sl-menu li { position: relative; }
  .sl-trigger, .sl-link {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 16px; border-radius: 6px;
    font-size: 14px; font-weight: 500; color: var(--sl-fg);
    transition: background-color .15s ease;
  }
  .sl-trigger:hover, .sl-link:hover, .sl-trigger[aria-expanded="true"] { background: var(--sl-hover); }
  .sl-chev { width: 16px; height: 16px; transition: transform .2s ease; }
  .sl-trigger[aria-expanded="true"] .sl-chev { transform: rotate(180deg); }

  .sl-ctas { display: none; align-items: center; gap: 8px; }
  .sl-login { font-size: 14px; font-weight: 500; color: var(--sl-muted); padding: 8px 12px; }
  .sl-login:hover { color: var(--sl-fg); }
  .sl-signup {
    background: var(--sl-fg); color: var(--sl-bg);
    padding: 8px 16px; border-radius: 6px;
    font-size: 14px; font-weight: 600;
    transition: opacity .15s ease;
  }
  .sl-signup:hover { opacity: .9; }

  .sl-burger {
    display: inline-flex; align-items: center; justify-content: center;
    padding: 8px; border-radius: 6px; color: var(--sl-fg);
  }
  .sl-burger:hover { background: var(--sl-hover); }
  .sl-burger svg { width: 24px; height: 24px; }
  .sl-burger .icon-close { display: none; }
  .sl-burger[aria-expanded="true"] .icon-open { display: none; }
  .sl-burger[aria-expanded="true"] .icon-close { display: block; }

  /* Mega menus (desktop) — fixed to viewport so they escape Elementor parent width */
  .sl-mega {
    position: fixed; left: 0; right: 0;
    top: var(--sl-header-bottom, 64px);
    width: 100vw;
    background: var(--sl-bg);
    border-bottom: 1px solid var(--sl-border);
    box-shadow: var(--sl-shadow);
    opacity: 0; transform: translateY(-8px);
    pointer-events: none;
    transition: opacity .2s ease, transform .2s ease;
    display: none;
    z-index: 2147483647;
  }
  .sl-mega.is-open { opacity: 1; transform: translateY(0); pointer-events: auto; }
  .sl-mega-inner {
    max-width: 1280px; margin: 0 auto;
    padding: 40px 24px;
    display: grid; grid-template-columns: 1fr; gap: 48px;
  }
  @media (min-width: 1024px) {
    .sl-mega-inner.cols-12 { grid-template-columns: 4fr 1px 7fr; gap: 48px; }
  }
  .sl-divider { background: var(--sl-border); width: 1px; height: 100%; }
  .sl-section-title {
    margin: 0 0 20px; font-size: 12px; font-weight: 600;
    letter-spacing: 0.14em; text-transform: uppercase; color: var(--sl-muted);
  }
  .sl-list { list-style: none; padding: 0; margin: 0; display: grid; grid-template-columns: 1fr; gap: 4px; }
  .sl-list.two-col { gap: 4px 12px; }
  @media (min-width: 640px) { .sl-list.two-col { grid-template-columns: 1fr 1fr; } }

  .sl-item {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 12px; border-radius: 8px;
    transition: background-color .15s ease;
  }
  .sl-item:hover { background: var(--sl-hover); }
  .sl-item-ico {
    flex: 0 0 auto; width: 36px; height: 36px;
    border: 1px solid var(--sl-border); border-radius: 6px;
    display: inline-flex; align-items: center; justify-content: center;
    color: var(--sl-fg); background: var(--sl-bg);
    margin-top: 2px;
  }
  .sl-item-ico svg { width: 18px; height: 18px; }
  .sl-item-body { display: flex; flex-direction: column; }
  .sl-item-title { font-size: 14px; font-weight: 600; color: var(--sl-fg); }
  .sl-item-desc { font-size: 14px; color: var(--sl-muted); }

  .sl-item.simple { align-items: center; }
  .sl-item.simple .sl-item-ico { margin-top: 0; }

  .ico-red { color: #ef4444; }
  .ico-blue { color: #2563eb; }
  .ico-pink { color: #ec4899; }
  .ico-indigo { color: #6366f1; }
  .ico-muted { color: var(--sl-muted); }

  /* Mobile drawer (slide down) — fixed to viewport so it spans full width in Elementor */
  .sl-mobile {
    position: fixed; left: 0; right: 0;
    top: var(--sl-header-bottom, 64px);
    width: 100vw;
    background: var(--sl-bg); border-bottom: 1px solid var(--sl-border);
    overflow: hidden; max-height: 0; opacity: 0; visibility: hidden;
    transition: max-height .32s ease, opacity .2s ease, visibility .2s ease;
    z-index: 2147483647;
  }
  .sl-portal {
    position: fixed !important;
    top: 0; left: 0;
    width: 0; height: 0;
    z-index: 2147483647 !important;
    pointer-events: none;
    background: transparent !important;
    border: 0 !important;
    backdrop-filter: none !important;
    -webkit-backdrop-filter: none !important;
    isolation: isolate;
  }
  .sl-portal .sl-mega,
  .sl-portal .sl-mobile { pointer-events: auto; }
  .sl-nav.is-mobile-open .sl-mobile { max-height: calc(100vh - var(--sl-header-bottom, 64px)); opacity: 1; visibility: visible; overflow-y: auto; }
  .sl-mobile-inner { padding: 16px; display: flex; flex-direction: column; gap: 4px; }
  .sl-msec { border-bottom: 1px solid var(--sl-border); }
  .sl-msec:last-child { border-bottom: 0; }
  .sl-msec-btn {
    width: 100%; display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px; border-radius: 6px; font-size: 16px; font-weight: 500; color: var(--sl-fg);
  }
  .sl-msec-btn:hover { background: var(--sl-hover); }
  .sl-msec-btn .sl-chev { transition: transform .2s ease; }
  .sl-msec[aria-expanded="true"] .sl-msec-btn .sl-chev { transform: rotate(180deg); }
  .sl-msec-body { display: none; padding: 0 8px 12px; }
  .sl-msec[aria-expanded="true"] .sl-msec-body { display: block; }
  .sl-mgroup-title { margin: 12px 12px 4px; font-size: 12px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: var(--sl-muted); }
  .sl-mlink { display: block; padding: 12px 16px; border-radius: 6px; font-size: 16px; font-weight: 500; color: var(--sl-fg); }
  .sl-mlink:hover { background: var(--sl-hover); }
  .sl-mctas { padding-top: 16px; margin-top: 16px; border-top: 1px solid var(--sl-border); display: flex; flex-direction: column; gap: 8px; }
  .sl-mctas .sl-signup { display: block; text-align: center; padding: 12px 16px; border-radius: 6px; }

  @media (min-width: 1024px) {
    .sl-menu { display: flex; }
    .sl-ctas { display: flex; }
    .sl-burger { display: none; }
    .sl-mega { display: block; }
    .sl-mobile { display: none; }
  }
</style>

<header class="sl-nav" id="slNav">
  <nav class="sl-bar">

      <span class="sl-logo-mark">

       This way each URL is defined exactly ONCE. -->
  <div id="slMenuMount"></div>
</header>

<script>

  if (!nav) return;
  var mount = document.getElementById('slMenuMount');
  var menu = document.getElementById('slMenu');
  var ctas = document.getElementById('slCtas');
  var burger = document.getElementById('slBurger');

  // ---- Read link config ----
  var cfg;
  try { cfg = JSON.parse(document.getElementById('slMenuConfig').textContent); }
  catch(e) { console.error('Scalelist nav: invalid JSON config', e); return; }

  // ---- Icon library (inline SVG strings) ----
  var ICONS = {
    data:    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5v14a9 3 0 0 0 18 0V5"/><path d="M3 12a9 3 0 0 0 18 0"/></svg>',
    users:   '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>',
    search:  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>',
    check:   '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>',
    chrome:  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="4"/><line x1="21.17" y1="8" x2="12" y2="8"/><line x1="3.95" y1="6.06" x2="8.54" y2="14"/><line x1="10.88" y1="21.94" x2="15.46" y2="14"/></svg>',

    puzzle:  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>',
    code:    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>',
    file:    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>',
    youtube: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22.54 6.42a2.78 2.78 0 0 0-1.94-2C18.88 4 12 4 12 4s-6.88 0-8.6.46a2.78 2.78 0 0 0-1.94 2A29 29 0 0 0 1 11.75a29 29 0 0 0 .46 5.33A2.78 2.78 0 0 0 3.4 19c1.72.46 8.6.46 8.6.46s6.88 0 8.6-.46a2.78 2.78 0 0 0 1.94-2 29 29 0 0 0 .46-5.25 29 29 0 0 0-.46-5.33z"/><polygon points="9.75 15.02 15.5 11.75 9.75 8.48 9.75 15.02"/></svg>',

    help:    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>',

  };
  function ico(name, cls){ return '<span class="sl-item-ico'+(cls?' '+cls:'')+'">'+(ICONS[name]||'')+'</span>'; }
  function esc(s){ return String(s||'').replace(/[&<>"']/g, function(c){ return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]); }); }

  // ---- Apply top-level link hrefs ----
  Object.keys(cfg.topLevel||{}).forEach(function(key){
    nav.querySelectorAll('[data-link="'+key+'"]').forEach(function(a){ a.setAttribute('href', cfg.topLevel[key]); });
  });

  // ---- Render desktop mega menus ----
  function renderItem(it){
    return '<li><a href="'+esc(it.href)+'" class="sl-item">'+ico(it.icon)+
      '<span class="sl-item-body"><span class="sl-item-title">'+esc(it.title)+'</span>'+
      (it.desc?'<span class="sl-item-desc">'+esc(it.desc)+'</span>':'')+
      '</span></a></li>';
  }
  function renderSimple(it){
    return '<li><a href="'+esc(it.href)+'" class="sl-item simple">'+ico(it.icon, it.iconClass)+
      '<span class="sl-item-title">'+esc(it.title)+'</span></a></li>';
  }

  var platformHTML =
    '<div class="sl-mega" data-mega="platform"><div class="sl-mega-inner cols-12">'+
      '<section><h3 class="sl-section-title">Overview</h3><ul class="sl-list">'+
        cfg.platform.overview.map(renderItem).join('')+
      '</ul></section>'+
      '<div class="sl-divider"></div>'+
      '<section><h3 class="sl-section-title">Features</h3><ul class="sl-list two-col">'+
        cfg.platform.features.map(renderItem).join('')+
      '</ul></section>'+
    '</div></div>';

  var resourcesHTML =
    '<div class="sl-mega" data-mega="resources"><div class="sl-mega-inner">'+
      '<section><h3 class="sl-section-title">Resources</h3><ul class="sl-list two-col">'+
        cfg.resources.map(renderSimple).join('')+
      '</ul></section>'+
    '</div></div>';

  // ---- Render mobile drawer ----
  var mobileHTML =
    '<div class="sl-mobile" id="slMobile"><div class="sl-mobile-inner">'+
      '<div class="sl-msec" data-msec="platform">'+
        '<button type="button" class="sl-msec-btn">Platform'+
          '<svg class="sl-chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>'+
        '</button>'+
        '<div class="sl-msec-body">'+
          '<div class="sl-mgroup-title">Overview</div><ul class="sl-list">'+cfg.platform.overview.map(renderItem).join('')+'</ul>'+
          '<div class="sl-mgroup-title">Features</div><ul class="sl-list">'+cfg.platform.features.map(renderItem).join('')+'</ul>'+
        '</div>'+
      '</div>'+
      '<div class="sl-msec" data-msec="resources">'+
        '<button type="button" class="sl-msec-btn">Resources'+
          '<svg class="sl-chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>'+
        '</button>'+
        '<div class="sl-msec-body"><ul class="sl-list">'+cfg.resources.map(renderSimple).join('')+'</ul></div>'+
      '</div>'+
      '<a href="'+esc(cfg.topLevel.customers)+'" class="sl-mlink">Customers</a>'+
      '<a href="'+esc(cfg.topLevel.pricing)+'" class="sl-mlink">Pricing</a>'+
      '<div class="sl-mctas">'+
        '<a href="'+esc(cfg.topLevel.login)+'" class="sl-mlink">Log in</a>'+
        '<a href="'+esc(cfg.topLevel.signup)+'" class="sl-signup">Sign up free</a>'+
      '</div>'+
    '</div></div>';

  mount.innerHTML = platformHTML + resourcesHTML + mobileHTML;

  var triggers = nav.querySelectorAll('.sl-trigger');
  var megas = nav.querySelectorAll('.sl-mega');
  var mobile = document.getElementById('slMobile');
  var closeTimer = null;
  var current = null;

  // Move mega menus + mobile drawer to <body> so they escape any transformed
  // Elementor parent (transformed ancestors break position:fixed viewport sizing).
  var portal = document.createElement('div');
  portal.className = 'sl-nav sl-portal';
  megas.forEach(function(m){ portal.appendChild(m); });
  if (mobile) portal.appendChild(mobile);
  document.body.appendChild(portal);

  function syncHeaderOffset(){
    var rect = nav.getBoundingClientRect();
    var bottomPx = rect.bottom + 'px';
    nav.style.setProperty('--sl-header-bottom', bottomPx);
    portal.style.setProperty('--sl-header-bottom', bottomPx);
  }
  syncHeaderOffset();
  window.addEventListener('scroll', syncHeaderOffset, { passive: true });
  window.addEventListener('resize', syncHeaderOffset);
  if (window.ResizeObserver) { new ResizeObserver(syncHeaderOffset).observe(nav); }

  function openMenu(key){
    current = key;
    triggers.forEach(function(t){ t.setAttribute('aria-expanded', t.dataset.menu === key ? 'true' : 'false'); });
    megas.forEach(function(m){ m.classList.toggle('is-open', m.dataset.mega === key); });
  }
  function closeMenu(){
    current = null;
    triggers.forEach(function(t){ t.setAttribute('aria-expanded', 'false'); });
    megas.forEach(function(m){ m.classList.remove('is-open'); });
  }
  function scheduleClose(){ if (closeTimer) clearTimeout(closeTimer); closeTimer = setTimeout(closeMenu, 120); }
  function cancelClose(){ if (closeTimer) { clearTimeout(closeTimer); closeTimer = null; } }

  triggers.forEach(function(t){
    var li = t.parentElement;
    li.addEventListener('mouseenter', function(){ cancelClose(); openMenu(t.dataset.menu); });
    li.addEventListener('mouseleave', scheduleClose);
    t.addEventListener('click', function(e){
      e.preventDefault();
      if (current === t.dataset.menu) closeMenu(); else openMenu(t.dataset.menu);
    });
  });
  megas.forEach(function(m){
    m.addEventListener('mouseenter', cancelClose);
    m.addEventListener('mouseleave', scheduleClose);
  });

  function handleMobileClick(e){
    var burgerClick = e.target.closest('#slBurger');
    var sectionButton = e.target.closest('.sl-msec-btn');
    if (burgerClick) {
      var isOpen = !nav.classList.contains('is-mobile-open');
      nav.classList.toggle('is-mobile-open', isOpen);
      portal.classList.toggle('is-mobile-open', isOpen);
      burger.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
      return;
    }
    if (sectionButton) {
      var sec = sectionButton.parentElement;
      var open = sec.getAttribute('aria-expanded') === 'true';
      portal.querySelectorAll('.sl-msec').forEach(function(s){ s.setAttribute('aria-expanded', 'false'); });
      sec.setAttribute('aria-expanded', open ? 'false' : 'true');
    }
  }
  nav.addEventListener('click', handleMobileClick);
  portal.addEventListener('click', handleMobileClick);
})();
</script>
